spring.application.name=DeliverySystem


# =============================================================================
# APPLICATION CONFIGURATION
# food-delivery-dispatch-system
#
# Think of this file as the "settings panel" for the entire application.
# Every external connection, behavior, and feature toggle is configured here.
# =============================================================================

# ------------------------------------------------------------------------------
# APP IDENTITY
# ------------------------------------------------------------------------------
# Server runs on port 8080 by default
server.port=8080

# ------------------------------------------------------------------------------
# POSTGRESQL DATABASE CONFIGURATION
# ------------------------------------------------------------------------------
# WHAT IS THIS? PostgreSQL is our primary database.
# It stores Orders, Drivers, and all permanent data.
#
# Format: jdbc:postgresql://<host>:<port>/<database_name>
# ------------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/food_delivery_db
spring.datasource.username=postgres
spring.datasource.password=root@39
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
# hibernate.ddl-auto=update ? Automatically creates/updates DB tables based on our Entity classes
# Use "validate" in production (never auto-create in prod!)
spring.jpa.hibernate.ddl-auto=update

# show-sql=true ? Print every SQL query in console (great for debugging, turn off in prod)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# =============================================================================
# ------------------------------------------------------------------------------
# REDIS CONFIGURATION
# ------------------------------------------------------------------------------
# WHAT IS REDIS? An in-memory key-value store.
# We use it for:
#   1. Driver GEO locations (lightning-fast nearest-driver lookup)
#   2. Distributed locks (prevent two orders grabbing same driver)
#   3. Caching driver availability
# ------------------------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=yourpassword  # Uncomment if Redis has auth

# Connection pool settings
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

# ------------------------------------------------------------------------------
# KAFKA CONFIGURATION
# ------------------------------------------------------------------------------
# WHAT IS KAFKA? A message queue / event streaming platform.
# Think of it as a "post office":
#   - OrderService SENDS a letter (ORDER_CREATED event)
#   - DispatchService RECEIVES it and processes it
# This way services are DECOUPLED ? they don't call each other directly
# ------------------------------------------------------------------------------
spring.kafka.bootstrap-servers=localhost:9092

# Producer (sends messages)
# REQUIRED for KafkaTemplate bean creation
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# IMPORTANT (fixes most issues)
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Consumer (reads messages)
spring.kafka.consumer.group-id=dispatch-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fooddelivery.event

# ------------------------------------------------------------------------------
# TOPIC NAMES (used in @KafkaListener and KafkaTemplate)
# ------------------------------------------------------------------------------
kafka.topic.order-created=order.created
kafka.topic.driver-assigned=driver.assigned
kafka.topic.order-cancelled=order.cancelled

# ------------------------------------------------------------------------------
# REDIS KEYS (prefix constants for clean key management)
# ------------------------------------------------------------------------------
redis.key.driver-location=driver:locations       # GEO SET for all driver locations
redis.key.driver-lock-prefix=driver:lock:        # Lock prefix ? driver:lock:{driverId}
redis.key.driver-availability=driver:available:  # Hash for driver availability

# Lock TTL in seconds (how long to hold the lock during assignment)
redis.lock.ttl-seconds=10

# ------------------------------------------------------------------------------
# JWT SECURITY CONFIGURATION
# ------------------------------------------------------------------------------
# WHAT IS JWT? JSON Web Token. A signed string like:
#   "eyJhbGci..." that contains user identity.
# We verify it on every request to authenticate users.
# ------------------------------------------------------------------------------
jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmSecurity
jwt.expiration-ms=86400000  # 24 hours in milliseconds

# ------------------------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------------------------
logging.level.com.fooddelivery=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG